<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takoroka 3100+ Sendou Accounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen p-4 md:p-6">
    <main class="mx-auto w-full max-w-6xl">
        <div class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm md:p-6">
            <div class="mb-5">
                <h1 class="text-2xl font-semibold">Takoroka 3100+ Sendou Accounts</h1>
                <p class="mt-1 text-sm text-slate-600">
                    Sendou-linked players who reached a Takoroka peak of at least 3100 XP.
                </p>
            </div>

            <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <input
                    id="searchInput"
                    type="text"
                    placeholder="Search splashtag, mode, season, sendou, or NPLN ID"
                    class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none"
                >
                <div id="summary" class="text-sm text-slate-600"></div>
            </div>

            <div id="loadingIndicator" class="py-10 text-center text-sm text-slate-500">
                Loading data...
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-4 py-3 text-left font-medium text-slate-600">Peak XP</th>
                            <th class="px-4 py-3 text-left font-medium text-slate-600">Splashtag</th>
                            <th class="px-4 py-3 text-left font-medium text-slate-600">Peak</th>
                            <th class="px-4 py-3 text-left font-medium text-slate-600">Peak Season</th>
                            <th class="px-4 py-3 text-left font-medium text-slate-600">Snapshots</th>
                            <th class="px-4 py-3 text-left font-medium text-slate-600">Modes</th>
                            <th class="px-4 py-3 text-left font-medium text-slate-600">Seasons</th>
                            <th class="px-4 py-3 text-left font-medium text-slate-600">SplatTop</th>
                            <th class="px-4 py-3 text-left font-medium text-slate-600">Sendou</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-200 bg-white"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
